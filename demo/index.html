<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>web-access demo — intentionally inaccessible</title>
    <style>
      body { font-family: sans-serif; margin: 0; }
      .hero {
        height: 240px;
        display: flex;
        align-items: center;
        justify-content: center;
        /* image/gradient background → axe can't judge contrast; our Tier-2 pixel sampler can */
        background-image: linear-gradient(135deg, #808080, #909090);
        color: #a0a0a0; /* deliberately low contrast over the gradient */
        font-size: 28px;
        font-weight: 700;
      }
      main { padding: 24px; }
      /* column-reverse: DOM order ≠ visual order → reading/focus-order inversion */
      .rev { display: flex; flex-direction: column-reverse; gap: 24px; width: 220px; }
      .rev button { padding: 10px; }
    </style>
  </head>
  <body>
    <div class="hero">Low-contrast hero text over a gradient</div>
    <main>
      <h1>Demo page</h1>

      <!-- Tier 1 (axe): image with no alt -->
      <img src="/demo/none.png" width="120" height="80" />

      <!-- Tier 1 (axe): link with no accessible name -->
      <a href="/next"></a>

      <!-- Tier 1 (geometry): positive tabindex -->
      <p><input type="text" tabindex="5" placeholder="bad tabindex" /></p>

      <!-- Tier 2 (geometry): column-reverse renders "Second" above "First" -->
      <div class="rev">
        <button>First in DOM (renders at bottom)</button>
        <button>Second in DOM (renders at top)</button>
      </div>
    </main>

    <!-- the real one-line embed -->
    <script
      src="/embed/web-access.global.js"
      data-site-id="demo-site"
      data-ingest="http://localhost:3001"
      async
    ></script>
  </body>
</html>
