services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: webaccess
      POSTGRES_PASSWORD: webaccess
      POSTGRES_DB: webaccess
    ports:
      - "5544:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webaccess"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6399:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
